name: Deploy para GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Injetar API Key
        run: |
          find codigo-fonte -name "*.js" -exec \
            sed -i "s/TMDB_API_KEY_PLACEHOLDER/${{ secrets.TMDB_API_KEY }}/g" {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "codigo-fonte"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
